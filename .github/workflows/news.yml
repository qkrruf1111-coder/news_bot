name: 📰 Daily News to Telegram

on:
  schedule:
    # 오전 8시 (UTC+9 기준 → UTC는 -9시간)
    - cron: "0 23 * * *"   # 전날 23:00 UTC = 당일 08:00 KST
    # 오후 6시 (UTC+9 기준)
    - cron: "0 9 * * *"    # 09:00 UTC = 18:00 KST

  # 수동으로도 실행 가능하게
  workflow_dispatch:

jobs:
  send-news:
    runs-on: ubuntu-latest

    steps:
      - name: 📥 코드 가져오기
        uses: actions/checkout@v4

      - name: 🐍 Python 설치
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: 📦 패키지 설치
        run: pip install requests feedparser

      - name: 🚀 뉴스 전송
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python news.py
